<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السماء السوداء - محاكي الضغط والاصطدام المفرط</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #09090b; color: #f4f4f5; padding: 20px; }
        .container { max-width: 750px; margin: 0 auto; background: #18181b; padding: 30px; border-radius: 12px; border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { text-align: center; color: #ef4444; margin-bottom: 5px; }
        .status-box { background: #27272a; padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 18px; }
        .counter { font-size: 32px; font-weight: bold; color: #3b82f6; text-align: center; margin: 10px 0; }
        button.stress-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #dc2626; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.stress-btn:hover { background: #b91c1c; }
        #logs { max-height: 200px; overflow-y: auto; background: #09090b; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 6px; border: 1px solid #3f3f46; color: #a1a1aa; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ نظام محاكاة واختبار الضغط الأقصى</h2>
    <p style="text-align:center; color:#a1a1aa;">سيتم قصف السيرفر بـ 1000 طلب إدخال مكثف متوازي خلال ثوانٍ معدودة لاختبار الاصطدامات والحدود المعمارية.</p>

    <div class="status-box">
        <div>إجمالي الطلبات المطلوبة في الدفعة: <span style="float:left; color:#fff;">1000 طلب</span></div>
        <div style="margin-top:10px;">الطلبات التي تم إطلاقها بنجاح للجو:</div>
        <div class="counter" id="sentCount">0</div>
        <div>الحالة الحالية: <span id="runStatus" style="color:#e4e4e7; font-weight:bold;">مستعد للهجوم</span></div>
    </div>

    <button class="stress-btn" onclick="startHyperStressTest()">🚀 إطلاق هجوم الـ 1000 طلب المتوازي</button>

    <div id="logs">بانتظار إشارة البدء...</div>
</div>

<script>
    const API_URL = 'https://nour774-blacksky-api.hf.space/api';
    
    // دالة لتوليد نص عشوائي يحتوي على عدد الكلمات المطلوبة (حماية للذاكرة وباقة الإرسال)
    function generateLargeContent(wordCount) {
        const words = ["سماء", "سوداء", "فراغ", "أكوان", "أبعاد", "سيادة", "طاقة", "زراعة", "خلود", "قتال", "مملكة", "عاهل", "قوة", "مستمر"];
        let result = [];
        for (let i = 0; i < wordCount; i++) {
            result.push(words[Math.floor(Math.random() * words.length)]);
        }
        return result.join(" ");
    }

    async function startHyperStressTest() {
        const logDiv = document.getElementById('logs');
        const sentCounter = document.getElementById('sentCount');
        const runStatus = document.getElementById('runStatus');
        
        logDiv.innerHTML = "=== بدء توليد وتفجير البيانات ===<br>";
        runStatus.innerText = "جاري القصف المكثف... 🔥";
        runStatus.style.color = "#ef4444";
        
        let sent = 0;
        const totalRequests = 1000;
        
        // تجهيز مصفوفة الوعود (Promises) للإرسال المتوازي الصاعق
        let promises = [];

        // توليد نص الفصل الثابت (1500 كلمة فما فوق) مرة واحدة لتوفير معالجة المتصفح
        const heavyChapterContent = generateLargeContent(1550);

        for (let i = 1; i <= totalRequests; i++) {
            let endpoint = '';
            let bodyData = {};

            // خلط الطلبات: طلب إضافة رواية، يليه طلبات إضافة فصول متتابعة لنفس الرواية أو روايات مختلفة
            if (i % 5 === 0) {
                // إرسال طلب إضافة رواية جديدة
                endpoint = 'add-novel';
                bodyData = {
                    englishName: `Stress Novel ${i}`,
                    arabicName: `رواية الضغط ${i}`,
                    slug: `stress-novel-${i}`,
                    genres: [1, 8, 16],
                    status: 0,
                    author: "StressBot",
                    coverType: "png",
                    uploaderId: 777,
                    uploaderUsername: "Chaos_Engine",
                    description: "وصف طويل تم توليده لاختبار قوة تحمل المستودع والملفات."
                };
            } else {
                // إرسال طلب حقن فصل
                endpoint = 'add-chapter';
                // سنفترض توزيع الفصول على روايات بمعرفات عشوائية أو متقاربة لفرض تداخل البيانات
                const targetNovelId = Math.floor(Math.random() * 20) + 1; 
                bodyData = {
                    novelId: targetNovelId,
                    chapterNum: i,
                    chapterTitle: `الفصل العاصف رقم ${i}`,
                    contributor: "Hacker_X",
                    content: heavyChapterContent
                };
            }

            // إرسال فوري دون انتظار (Fire and Forget) لكي تصطدم الطلبات في نفس الأجزاء من الثانية!
            const requestPromise = fetch(`${API_URL}/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            }).then(res => {
                sent++;
                sentCounter.innerText = sent;
                if (sent % 100 === 0) {
                    logDiv.innerHTML += `[نجاح] تم حقن واستقبال ${sent} طلب في ذاكرة السيرفر السحابي.<br>`;
                    logDiv.scrollTop = logDiv.scrollHeight;
                }
            }).catch(err => {
                logDiv.innerHTML += `<span style="color:#f87171;">[خطأ اتصال] فشل طلب: ${err.message}</span><br>`;
            });

            promises.push(requestPromise);
            
            // إحداث توقف متناهي الصغر (أجزاء من الملي ثانية) كل 10 طلبات لخلخلة موجات الإرسال وفحص قوة الـ Event Loop
            if (i % 10 === 0) {
                await new Promise(resolve => setTimeout(resolve, 2));
            }
        }

        // الانتظار حتى تنطلق وتستقر كل الـ 1000 قذيفة في رام Hugging Face
        await Promise.all(promises);
        
        runStatus.innerText = "اكتمل القصف! بانتظار تجميع الـ 15 ثانية... ⏳";
        runStatus.style.color = "#3b82f6";
        logDiv.innerHTML += "<b>=== انتهى الهجوم بنجاح! راقب الآن سجلات الـ Logs في Hugging Face وجيثب لتشاهد المعجزة ===</b><br>";
        logDiv.scrollTop = logDiv.scrollHeight;
    }
</script>

</body>
</html>
